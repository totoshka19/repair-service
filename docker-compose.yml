services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: repair
      POSTGRES_PASSWORD: repair
      POSTGRES_DB: repair_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U repair -d repair_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://repair:repair@db:5432/repair_db
      SESSION_SECRET: docker-compose-local-secret-change-in-production
      NODE_ENV: production

volumes:
  postgres_data:
